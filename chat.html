<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>CHAT Simulator</title>
<style>
body { font-family: Arial, Helvetica, sans-serif; background: #eef2f6; margin: 0; text-align: center; }
#controls { background: white; padding: 12px; border-bottom: 1px solid #ccc; }
canvas { background: white; border: 1px solid #bbb; margin-top: 10px; }
button { margin-left: 6px; padding: 6px 10px; }
select { padding: 5px; }
#counter { margin-top: 6px; font-weight: bold; }
#tooltip { position: absolute; background: white; border: 1px solid #333; padding: 8px; border-radius: 5px; font-size: 13px; display: none; pointer-events: none; max-width: 250px; text-align: left; line-height: 1.3; box-shadow: 0 2px 8px rgba(0,0,0,0.2); z-index: 10; }
</style>
</head>
<body>

<div id="controls">
  Title <input id="titleInput" value="CHAT Simulation" />
  Markers Allowed <input id="markerLimit" type="number" value="100" style="width: 80px" />
  <input type="file" id="upload" accept=".xlsx" />
  <button onclick="exportCSV()">Export Results</button>
  <button onclick="saveBoard()">Save Board</button>
  <select id="boardList" onchange="loadBoard()"><option value="">Load Board</option></select>
  <button onclick="deleteBoard()">Delete</button>
  <div id="counter">Markers Used: 0</div>
</div>

<canvas id="board" width="1800" height="1400"></canvas>
<div id="tooltip"></div>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script>
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
const tooltip = document.getElementById("tooltip");
const centerX = canvas.width / 2;
const centerY = canvas.height / 2;
const tiers = [240,420,600];
const centerRadius = 50;
const colors = ["#b7d9a8","#f2d2a9","#c7d3df","#5fa8d3","#a9d3df","#dfdf55","#c7c7c7","#e0a5c9","#b18a7a","#d6cbe4","#e8a8a8","#c0c0c0"];

let slices = [];
let descriptions = [];
let tierCosts = [];
let slots = [];
let selectedTier = [];
let hoveredSlice = -1;

// Load XLSX
document.getElementById("upload").addEventListener("change", function(e){
  const reader = new FileReader();
  reader.onload = function(e){
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data,{type:"array"});
    const sheet = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
    slices = sheet.map(r=>({name:r.Slice}));
    descriptions = sheet.map(r=>({tier1:r.Tier1Desc||"", tier2:r.Tier2Desc||"", tier3:r.Tier3Desc||""}));
    tierCosts = sheet.map(r=>[r.Tier1||0,r.Tier2||0,r.Tier3||0]);
    selectedTier = new Array(slices.length).fill(0);
    createSlots();
    updateCounter();
    drawBoard();
  };
  reader.readAsArrayBuffer(e.target.files[0]);
});

// Slots
function createSlots(){
  slots = [];
  const sliceAngle = (Math.PI*2)/slices.length;
  for(let s=0;s<slices.length;s++){
    const start = s*sliceAngle;
    const end = start + sliceAngle;
    for(let t=0;t<3;t++){
      const count = tierCosts[s][t];
      const rows = Math.ceil(count/8);
      const perRow = Math.ceil(count/rows);
      let placed = 0;
      for(let r=0;r<rows;r++){
        for(let c=0;c<perRow;c++){
          if(placed>=count) break;
          const angle = start + ((c+1)/(perRow+1))*(end-start);
          const baseRadius = [tiers[0]-90,tiers[1]-70,tiers[2]-60][t];
          const radius = baseRadius - r*20;
          const x = centerX + Math.cos(angle)*radius;
          const y = centerY + Math.sin(angle)*radius;
          slots.push({x,y,slice:s,tier:t+1});
          placed++;
        }
      }
    }
  }
}

// Wrap text
function wrapText(text,x,y,maxWidth,lineHeight){
  const words=text.split(" ");
  let line="";
  let lineCount=0;
  ctx.textAlign="center";
  ctx.fillStyle="black";
  for(let n=0;n<words.length;n++){
    const testLine=line+words[n]+" ";
    if(ctx.measureText(testLine).width>maxWidth && n>0){
      ctx.fillText(line,x,y+lineHeight*lineCount);
      line=words[n]+" ";
      lineCount++;
    }else{line=testLine;}
  }
  ctx.fillText(line,x,y+lineHeight*lineCount);
  return lineCount;
}

// Lighten
function lightenColor(col,percent){
  let num=parseInt(col.slice(1),16);
  let r=(num>>16)&0xff,g=(num>>8)&0xff,b=num&0xff;
  r=Math.min(255,Math.floor(r+(255-r)*percent));
  g=Math.min(255,Math.floor(g+(255-g)*percent));
  b=Math.min(255,Math.floor(b+(255-b)*percent));
  return `rgb(${r},${g},${b})`;
}

// Draw board
function drawBoard(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(!slices.length) return;
  const sliceAngle=(Math.PI*2)/slices.length;

  for(let i=0;i<slices.length;i++){
    const start=i*sliceAngle,end=start+sliceAngle;
    ctx.beginPath();
    ctx.moveTo(centerX,centerY);
    ctx.arc(centerX,centerY,tiers[2],start,end);
    ctx.closePath();
    ctx.fillStyle=colors[i%colors.length];
    ctx.fill();
    ctx.strokeStyle="#999";
    ctx.stroke();
  }

  if(hoveredSlice>=0 && hoveredSlice<slices.length){
    const i=hoveredSlice;
    const start=i*sliceAngle,end=start+sliceAngle;
    ctx.beginPath();
    ctx.moveTo(centerX,centerY);
    ctx.arc(centerX,centerY,tiers[2],start,end);
    ctx.closePath();
    ctx.fillStyle=lightenColor(colors[i%colors.length],0.35);
    ctx.fill();
  }

  tiers.forEach(r=>{
    ctx.beginPath();
    ctx.arc(centerX,centerY,r,0,Math.PI*2);
    ctx.strokeStyle="#777";
    ctx.stroke();
  });

  // Center circle
  ctx.beginPath();
  ctx.arc(centerX,centerY,centerRadius,0,Math.PI*2);
  ctx.fillStyle="#2f3b4a";
  ctx.fill();
  ctx.fillStyle="white";
  ctx.font="26px Arial";
  ctx.textAlign="center";
  ctx.fillText("CHAT",centerX,centerY+8);

  // Labels
  ctx.font="13px Arial";
  const labelRadius = tiers[2]+100;
  for(let i=0;i<slices.length;i++){
    const angle=i*sliceAngle+sliceAngle/2;
    const x=centerX+Math.cos(angle)*labelRadius;
    const y=centerY+Math.sin(angle)*labelRadius;
    const lineCount=wrapText(slices[i].name,x,y,140,15);
    slices[i].labelX = x;
    slices[i].labelY = y + (lineCount*15)/2;
  }

  drawMarkers();
}

// Draw markers
function drawMarkers(){
  slots.forEach(slot=>{
    const active=selectedTier[slot.slice]>=slot.tier;
    ctx.beginPath();
    ctx.arc(slot.x,slot.y,5,0,Math.PI*2);
    ctx.fillStyle=active?"#1f9d55":"white";
    ctx.strokeStyle="#222";
    ctx.fill();
    ctx.stroke();
  });
}

// Hover anywhere on slice
canvas.addEventListener("mousemove", function(e){
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const dx = x - centerX;
  const dy = y - centerY;
  const dist = Math.sqrt(dx*dx+dy*dy);
  let angle = Math.atan2(dy, dx);
  if(angle<0) angle += Math.PI*2;

  hoveredSlice = -1;
  const sliceAngle = (Math.PI*2)/slices.length;

  for(let i=0;i<slices.length;i++){
    const start = i*sliceAngle;
    const end = start+sliceAngle;
    if(angle>=start && angle<end && dist<=tiers[2]){
      hoveredSlice=i;
      tooltip.style.left = e.pageX+10+"px";
      tooltip.style.top = e.pageY+10+"px";
      tooltip.innerHTML=`<strong>${slices[i].name}</strong><br>
        <strong>Tier 1:</strong> ${descriptions[i].tier1||"N/A"}<br>
        <strong>Tier 2:</strong> ${descriptions[i].tier2||"N/A"}<br>
        <strong>Tier 3:</strong> ${descriptions[i].tier3||"N/A"}`;
      tooltip.style.display="block";
      break;
    }else{
      tooltip.style.display="none";
    }
  }

  drawBoard();
});

// Click select tier (cumulative)
canvas.addEventListener("click",function(e){
  const rect=canvas.getBoundingClientRect();
  const x=e.clientX-rect.left;
  const y=e.clientY-rect.top;
  const dx=x-centerX;
  const dy=y-centerY;
  const dist=Math.sqrt(dx*dx+dy*dy);
  let angle=Math.atan2(dy,dx);
  if(angle<0) angle+=Math.PI*2;
  const sliceAngle=(Math.PI*2)/slices.length;
  const slice=Math.floor(angle/sliceAngle);
  let tier=null;
  if(dist<tiers[0]) tier=1;
  else if(dist<tiers[1]) tier=2;
  else if(dist<tiers[2]) tier=3;
  if(!tier) return;

  let used=0;
  for(let i=0;i<slices.length;i++){
    const sel=selectedTier[i];
    if(sel>0) for(let j=0;j<sel;j++) used+=tierCosts[i][j];
  }

  if(selectedTier[slice]===tier) selectedTier[slice]=0;
  else{
    let cost=0;
    for(let j=0;j<tier;j++) cost+=tierCosts[slice][j];
    if(used+cost>parseInt(document.getElementById("markerLimit").value)) return;
    selectedTier[slice]=tier;
  }
  updateCounter();
  drawBoard();
});

function updateCounter(){
  let used=0;
  for(let i=0;i<slices.length;i++){
    const tier=selectedTier[i];
    if(tier>0) for(let j=0;j<tier;j++) used+=tierCosts[i][j];
  }
  const limit=parseInt(document.getElementById("markerLimit").value);
  document.getElementById("counter").innerText=`Markers Used: ${used} / ${limit}`;
}

// Save/load/delete
function saveBoard(){
  const name=prompt("Board name?");
  if(!name) return;
  const data={selectedTier,title:document.getElementById("titleInput").value};
  localStorage.setItem("chat_board_"+name,JSON.stringify(data));
  updateBoardList();
}
function loadBoard(){
  const name=document.getElementById("boardList").value;
  if(!name) return;
  const data=JSON.parse(localStorage.getItem("chat_board_"+name));
  selectedTier=data.selectedTier;
  document.getElementById("titleInput").value=data.title;
  updateCounter();
  drawBoard();
}
function deleteBoard(){
  const name=document.getElementById("boardList").value;
  if(!name) return;
  localStorage.removeItem("chat_board_"+name);
  updateBoardList();
}
function updateBoardList(){
  const select=document.getElementById("boardList");
  select.innerHTML='<option value="">Load Board</option>';
  Object.keys(localStorage).filter(k=>k.startsWith("chat_board_")).forEach(k=>{
    const name=k.replace("chat_board_","");
    const opt=document.createElement("option");
    opt.value=name; opt.textContent=name; select.appendChild(opt);
  });
}
function exportCSV(){
  const rows=[["Category","Tier Selected","Cost"]];
  for(let i=0;i<slices.length;i++){
    const tier=selectedTier[i];
    if(tier>0){
      let cost=0;
      for(let j=0;j<tier;j++) cost+=tierCosts[i][j];
      rows.push([slices[i].name,tier,cost]);
    }
  }
  const csv=rows.map(r=>r.join(",")).join("\n");
  const blob=new Blob([csv]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="chat_results.csv";
  a.click();
}

updateBoardList();
</script>
</body>
</html>
